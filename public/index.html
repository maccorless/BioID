<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NASidator &mdash; Neural Accreditation Snapshot Validator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hero">
    <div class="hero-inner">
      <span class="eyebrow">Neural Accreditation Snapshot Validator</span>
      <h1><span class="hl">NAS</span>idator</h1>
      <p class="subtitle">Upload a photo or use your camera &mdash; we'll run it through our ICAO-grade quality scan.</p>
    </div>
  </div>

  <main class="wrap">
    <section class="controls">
      <div class="issuer-picker">
        <label for="issuer">Standard</label>
        <select id="issuer">
          <option value="ICAO">ICAO (default / most countries)</option>
          <option value="US">United States</option>
          <option value="GB">United Kingdom</option>
          <option value="DE">Germany</option>
          <option value="AT">Austria</option>
          <option value="CH">Switzerland</option>
          <option value="NL">Netherlands</option>
          <option value="IN">India</option>
          <option value="BR">Brazil</option>
          <option value="TR">Turkey</option>
        </select>
      </div>

      <div class="source-buttons">
        <button id="btnUpload" class="btn">Upload photo</button>
        <button id="btnCamera" class="btn">Use camera</button>
        <input id="fileInput" type="file" accept="image/*" hidden />
      </div>
    </section>

    <section id="cameraSection" class="camera-section hidden">
      <div class="frame">
        <div class="frame-inner scan">
          <video id="video" autoplay playsinline></video>
        </div>
      </div>
      <div class="camera-actions">
        <button id="btnCapture" class="btn primary">Capture</button>
        <button id="btnCancelCamera" class="btn">Cancel</button>
      </div>
    </section>

    <section id="previewSection" class="preview-section hidden">
      <div class="frame">
        <div class="frame-inner">
          <img id="previewImg" alt="Selected photo preview" />
        </div>
      </div>
      <div class="preview-actions">
        <button id="btnCheck" class="btn primary">Check photo</button>
        <button id="btnRetake" class="btn">Choose different photo</button>
      </div>
    </section>

    <section id="resultSection" class="result-section hidden">
      <div id="resultBanner" class="result-banner"></div>
      <ul id="errorList" class="error-list"></ul>
      <details id="rawDetails" class="raw-details">
        <summary>Raw API response</summary>
        <pre id="rawJson"></pre>
      </details>
    </section>

    <canvas id="canvas" class="hidden"></canvas>

    <footer class="site-footer">
      <span>Test harness &mdash; not an official government or accreditation authority service</span>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
